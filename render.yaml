services:
  - type: web
    name: lensara-multilingual-platform
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build && cd .."
    startCommand: "python server.py"
    envVars:
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"